naftiko: 1.0.0-alpha2
info:
  label: Apache HTTP Server Status API — Status
  description: 'Apache HTTP Server Status API — Status. 2 operations. Lead operation: Apache HTTP Server Get Server Info.
    Self-contained Naftiko capability covering one Apache Httpd business surface.'
  tags:
  - Apache Httpd
  - Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_HTTPD_API_KEY: APACHE_HTTPD_API_KEY
capability:
  consumes:
  - type: http
    namespace: status-status
    baseUri: http://localhost:80
    description: Apache HTTP Server Status API — Status business capability. Self-contained, no shared references.
    resources:
    - name: server-info
      path: /server-info
      operations:
      - name: getserverinfo
        method: GET
        description: Apache HTTP Server Get Server Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: server-status
      path: /server-status
      operations:
      - name: getserverstatus
        method: GET
        description: Apache HTTP Server Get Server Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: auto
          in: query
          type: string
          description: Use 'auto' for machine-readable plain-text format
  exposes:
  - type: rest
    namespace: status-status-rest
    port: 8080
    description: REST adapter for Apache HTTP Server Status API — Status. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/server-info
      name: server-info
      description: REST surface for server-info.
      operations:
      - method: GET
        name: getserverinfo
        description: Apache HTTP Server Get Server Info
        call: status-status.getserverinfo
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/server-status
      name: server-status
      description: REST surface for server-status.
      operations:
      - method: GET
        name: getserverstatus
        description: Apache HTTP Server Get Server Status
        call: status-status.getserverstatus
        with:
          auto: rest.auto
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: status-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apache HTTP Server Status API — Status. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: apache-http-server-get-server
      description: Apache HTTP Server Get Server Info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: status-status.getserverinfo
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-http-server-get-server-2
      description: Apache HTTP Server Get Server Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: status-status.getserverstatus
      with:
        auto: tools.auto
      outputParameters:
      - type: object
        mapping: $.
