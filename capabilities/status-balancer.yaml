naftiko: 1.0.0-alpha2
info:
  label: Apache HTTP Server Status API — Balancer
  description: 'Apache HTTP Server Status API — Balancer. 2 operations. Lead operation: Apache HTTP Server Get Balancer Manager.
    Self-contained Naftiko capability covering one Apache Httpd business surface.'
  tags:
  - Apache Httpd
  - Balancer
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APACHE_HTTPD_API_KEY: APACHE_HTTPD_API_KEY
capability:
  consumes:
  - type: http
    namespace: status-balancer
    baseUri: http://localhost:80
    description: Apache HTTP Server Status API — Balancer business capability. Self-contained, no shared references.
    resources:
    - name: balancer-manager
      path: /balancer-manager
      operations:
      - name: getbalancermanager
        method: GET
        description: Apache HTTP Server Get Balancer Manager
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatebalancermember
        method: POST
        description: Apache HTTP Server Update Balancer Member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: status-balancer-rest
    port: 8080
    description: REST adapter for Apache HTTP Server Status API — Balancer. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/balancer-manager
      name: balancer-manager
      description: REST surface for balancer-manager.
      operations:
      - method: GET
        name: getbalancermanager
        description: Apache HTTP Server Get Balancer Manager
        call: status-balancer.getbalancermanager
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updatebalancermember
        description: Apache HTTP Server Update Balancer Member
        call: status-balancer.updatebalancermember
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: status-balancer-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apache HTTP Server Status API — Balancer. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: apache-http-server-get-balancer
      description: Apache HTTP Server Get Balancer Manager
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: status-balancer.getbalancermanager
      outputParameters:
      - type: object
        mapping: $.
    - name: apache-http-server-update-balancer
      description: Apache HTTP Server Update Balancer Member
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: status-balancer.updatebalancermember
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
